name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install -r requirements-dev.txt
      - run: python3 -m pytest backend/tests -q
      # ruff.toml exists but ruff isn't wired into any gate yet (233
      # pre-existing findings on this tree) — separate cleanup, not CI's job.

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - name: Fail if committed dist/ is stale
        run: |
          cd ..
          if ! git diff --quiet -- dist/; then
            echo "::error::dist/ is out of date — run 'npm run build' in frontend/ and commit the result."
            git diff --stat -- dist/
            exit 1
          fi
